apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rrelayer.fullname" . }}
  labels:
    {{- include "rrelayer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rrelayer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rrelayer.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.securityContext.enabled }}
      securityContext:
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "/app/rrelayer"
            - "start"
            - "-p"
            - "{{ .Values.projectPath }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: PROJECT_PATH
              value: {{ .Values.projectPath }}
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_PASSWORD
              {{- if .Values.externalSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: POSTGRES_PASSWORD
              {{- else }}
              value: {{ .Values.postgresql.auth.password | quote }}
              {{- end }}
            - name: DATABASE_URL
              {{- if .Values.externalSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret }}
                  key: DATABASE_URL
              {{- else }}
              value: {{ printf "postgres://%s:%s@%s:%s/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password .Values.postgresql.auth.host .Values.postgresql.auth.port .Values.postgresql.auth.database | quote }}
              {{- end }}
            {{- end }}
          volumeMounts:
            - name: rrelayer-config
              mountPath: {{ .Values.projectPath }}/rrelayer.yaml
              subPath: rrelayer.yaml
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: rrelayer-config
          configMap:
            name: {{ include "rrelayer.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
